version: '3.8'

services:
  backend:
    # Use remote image if DOCKER_USERNAME is set, otherwise build locally
    image: ${DOCKER_USERNAME}/qr-code-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qr-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    # Use remote image if DOCKER_USERNAME is set, otherwise build locally
    image: ${DOCKER_USERNAME}/qr-code-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qr-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${BACKEND_URL:-http://localhost:5000}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: qr-network
